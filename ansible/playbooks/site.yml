---
# Main Playbook — Complete Infrastructure Setup
# Usage: ansible-playbook -i inventory/prod.yml playbooks/site.yml

- name: Configure BlindStrader Infrastructure
  hosts: all
  become: yes
  gather_facts: yes

  pre_tasks:
    - name: Display target environment
      debug:
        msg: "Configuring {{ inventory_hostname }} for {{ app_environment }} environment"

    - name: Wait for system to be ready
      wait_for_connection:
        delay: 5
        timeout: 300

    - name: Gather facts
      setup:

  roles:
    - role: common
      tags: [common, base]

    - role: docker
      tags: [docker]

    - role: nginx
      tags: [nginx]

    - role: monitoring
      tags: [monitoring]

    - role: backups
      tags: [backups]
      when: backup_enabled | default(false)

    - role: app
      tags: [app, deploy]

  post_tasks:
    - name: Verify all Docker containers are running
      community.docker.docker_container_info:
        name: "{{ item }}"
      loop:
        - blindstrader-identity
        - blindstrader-brand
        - blindstrader-supplier
        - blindstrader-supply-chain
        - blindstrader-payment
        - blindstrader-retailer
        - blindstrader-platform
        - blindstrader-notification
        - blindstrader-mysql
        - blindstrader-redis
        - blindstrader-kafka
        - blindstrader-nginx
        - blindstrader-prometheus
        - blindstrader-grafana
      register: container_status

    - name: Display deployment summary
      debug:
        msg:
          - "=========================================="
          - "Deployment completed successfully!"
          - "Environment: {{ app_environment }}"
          - "Domain: {{ domain }}"
          - "=========================================="
          - "Services deployed:"
          - "  identity.{{{ domain }}} -> identity"
          - "  brand.{{{ domain }}} -> brand"
          - "  supplier.{{{ domain }}} -> supplier"
          - "  sc.{{{ domain }}} -> supply-chain"
          - "  payment.{{{ domain }}} -> payment"
          - "  retailer.{{{ domain }}} -> retailer"
          - "  platform.{{{ domain }}} -> platform"
          - "  notification.{{{ domain }}} -> notification"
          - "  docs.{{{{ domain }}}} -> Scalar API docs"
          - "  insights.{{{{ domain }}}} → Grafana"
          - "=========================================="
          - "Next steps:"
          - "1. Verify DNS propagation for all 9 subdomains"
          - "2. Obtain SSL certificates: ansible-playbook playbooks/ssl.yml"
          - "3. Test /health on each service endpoint"
          - "=========================================="
