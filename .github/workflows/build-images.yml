name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags:
      - 'prod-v*'
      - 'stage-v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_IDENTITY: ${{ github.repository_owner }}/blindstrader-identity
  IMAGE_NAME_BRAND: ${{ github.repository_owner }}/blindstrader-brand
  IMAGE_NAME_SUPPLIER: ${{ github.repository_owner }}/blindstrader-supplier
  IMAGE_NAME_SUPPLY_CHAIN: ${{ github.repository_owner }}/blindstrader-supply-chain
  IMAGE_NAME_PAYMENT: ${{ github.repository_owner }}/blindstrader-payment
  IMAGE_NAME_RETAILER: ${{ github.repository_owner }}/blindstrader-retailer
  IMAGE_NAME_PLATFORM: ${{ github.repository_owner }}/blindstrader-platform
  IMAGE_NAME_NOTIFICATION: ${{ github.repository_owner }}/blindstrader-notification

jobs:
  build-identity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_IDENTITY }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix={{{{branch}}}}-
            type=raw,value=latest,enable={{{{is_default_branch}}}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/identity
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_IDENTITY }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_IDENTITY }}:buildcache,mode=max

  build-brand:
