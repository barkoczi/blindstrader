  notification:
    image: ghcr.io/barkoczi/blindstrader-notification:latest
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    container_name: blindstrader-notification
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./services/notification:/app
    ports:
      - "8008:9000"
    environment:
      APP_NAME: Notification
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: blindstrader_notification
      DB_USERNAME: ${DB_USERNAME:-blindstrader}
      DB_PASSWORD: ${DB_PASSWORD:-blindstrader}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DOMAIN: .blindstrader.test
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
      SENTRY_ENVIRONMENT: notification
      SENTRY_TRACES_SAMPLE_RATE: 0.2
      SENTRY_SEND_DEFAULT_PII: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blindstrader
    command: sh -c "php artisan migrate --force && php-fpm"

  # ─── API Docs Portal (Scalar — MIT licence, self-hosted) ─────────────────────

  docs:
    build:
      context: ./services/docs
      dockerfile: Dockerfile
    image: ghcr.io/barkoczi/blindstrader-docs:latest
    depends_on:
      - identity
      - brand
      - supplier
      - supply-chain
      - payment
      - retailer
      - platform
      - notification
    networks:
      - blindstrader

  # ─── Reverse Proxy ───────────────────────────────────────────────────────────

  nginx:
    image: openresty/openresty:alpine
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: blindstrader-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      DOMAIN: blindstrader.test
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.tpl:ro
      - ./nginx/conf.d:/nginx-conf-tpl:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./services/identity:/app/identity:ro
      - ./services/brand:/app/brand:ro
      - ./services/supplier:/app/supplier:ro
      - ./services/supply-chain:/app/supply-chain:ro
      - ./services/payment:/app/payment:ro
      - ./services/retailer:/app/retailer:ro
      - ./services/platform:/app/platform:ro
      - ./services/notification:/app/notification:ro
      - ./logs/nginx:/var/log/nginx
      - certbot_webroot:/var/www/certbot:ro
    command: sh /docker-entrypoint.sh
    depends_on:
      - identity
      - brand
      - supplier
      - supply-chain
      - payment
      - retailer
      - platform
      - notification
      - docs
    networks:
      - blindstrader

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: blindstrader-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      UPLOAD_LIMIT: 100M
    ports:
      - "8010:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - blindstrader

  certbot:
    image: certbot/certbot:latest
    container_name: blindstrader-certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - blindstrader

  # ─── Monitoring Stack ────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: blindstrader-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    networks:
      - blindstrader

  grafana:
    image: grafana/grafana:latest
    container_name: blindstrader-grafana
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: https://insights.blindstrader.test
      GF_SERVER_DOMAIN: insights.blindstrader.test
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
    ports:
      - "8000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - blindstrader

  loki:
    image: grafana/loki:latest
    container_name: blindstrader-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki:/etc/loki
      - loki_data:/loki
    networks:
      - blindstrader

  promtail:
    image: grafana/promtail:latest
    container_name: blindstrader-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    ports:
      - "9080:9080"
    volumes:
      - ./monitoring/promtail:/etc/promtail
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs/nginx:/var/log/nginx:ro
    depends_on:
      - loki
    networks:
      - blindstrader

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: blindstrader-cadvisor
    restart: "no"   # crashes on ARM64 (Apple Silicon) — won't run locally
    privileged: true
    command:
      - --disable_metrics=cpuLoad,perf_event,percpu,referenced_memory,cpu_topology,resctrl
    ports:
      - "9338:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - blindstrader

  node-exporter:
    image: prom/node-exporter:latest
    container_name: blindstrader-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    pid: host
    networks:
      - blindstrader

  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: blindstrader-mysql-exporter
    restart: unless-stopped
    command:
      - "--mysqld.address=db:3306"
      - "--mysqld.username=exporter"
    environment:
      MYSQLD_EXPORTER_PASSWORD: ${MYSQL_EXPORTER_PASSWORD:-exporter_pass}
    ports:
      - "9104:9104"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - blindstrader

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: blindstrader-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "blindstrader-redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - blindstrader

networks:
  blindstrader:
    driver: bridge

volumes:
  db_data:
  redis_data:
  certbot_webroot:
  kafka_data:
  prometheus_data:
  grafana_data:
  loki_data:
