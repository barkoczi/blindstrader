# ─────────────────────────────────────────────────────────────────────────────
# OpenResty (nginx + LuaJIT) — BlindStrader API Gateway
#
# Responsibilities:
#   • Static routing: *.blindstrader.com → per-service PHP-FPM containers
#   • Dynamic routing: custom retailer domains → Retailer service via Redis
#     lookup  (domain:{host} → tenant_id)
#   • SSL termination, HTTP→HTTPS redirect, ACME challenge pass-through
# ─────────────────────────────────────────────────────────────────────────────

user nobody;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/openresty.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── OpenResty / Lua ───────────────────────────────────────────────────────
    # lua-resty-redis and lua-resty-core are bundled with openresty:alpine
    lua_package_path  "/usr/local/openresty/lualib/?.lua;/usr/local/openresty/luajit/share/luajit-2.1.0-beta3/?.lua;;";
    lua_package_cpath "/usr/local/openresty/lualib/?.so;;";

    # Shared dictionary: caches domain→tenant_id mappings to reduce Redis load.
    # 10 MB holds ~200 000 entries (avg 50 bytes each).
    lua_shared_dict tenant_cache 10m;

    # Docker's internal DNS — required for dynamic upstream resolution in Lua
    # (resolves service names like "redis", "retailer" at request time)
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ── Local development upstreams ───────────────────────────────────────────
    upstream phpmyadmin_backend {
        server phpmyadmin:80;
    }

    # ── Include per-service and storefront server blocks ──────────────────────
    include /etc/nginx/conf.d/*.conf;

    # ── Local development server blocks ───────────────────────────────────────

    # phpMyAdmin — pa.blindstrader.test
    server {
        listen 80;
        server_name pa.blindstrader.test;

        location / {
            proxy_pass         http://phpmyadmin_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # Root .test redirect → identity service
    server {
        listen 80;
        server_name blindstrader.test;
        return 302 http://identity.blindstrader.test;
    }
}
