# ─────────────────────────────────────────────────────────────────────────────
# Retailer Storefront — Dynamic Tenant Routing (OpenResty / Lua + Redis)
#
# Handles custom retailer domains that are NOT *.blindstrader.com subdomains.
# Examples: mystore.com, newblinds.co.uk, curtains.myshop.ie
#
# Flow:
#   1. Request arrives for custom domain (e.g. mystore.com)
#   2. Lua reads the Redis key  "domain:mystore.com"  → "newblinds"
#   3. tenant_id is cached in lua_shared_dict (tenant_cache) for 60 s
#   4. FastCGI request is forwarded to retailer:9000 with the tenant ID
#      injected as HTTP_X_TENANT_ID so stancl/tenancy can initialise
#      the correct tenant database
#
# Redis key provisioning (run once per retailer storefront):
#   redis-cli SET "domain:mystore.com" "newblinds" EX 0
#
# SSL for custom domains:
#   Each custom domain needs its own Let's Encrypt certificate obtained via:
#     certbot certonly --webroot -w /var/www/certbot -d mystore.com
#   Until the per-domain cert exists the default_server fallback cert is used
#   (browser will show a certificate warning — acceptable during provisioning).
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect for custom retailer domains ────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ACME challenge pass-through (for certbot --webroot on custom domains)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS catch-all: Lua Redis lookup → Retailer PHP-FPM ─────────────────────
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── SSL ───────────────────────────────────────────────────────────────────
    # Fallback certificate (used until per-domain cert is provisioned).
    # For production custom domains, obtain a cert with certbot and symlink it:
    #   /etc/letsencrypt/live/<domain>/fullchain.pem
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Retailer document root (same container, tenant resolved via header) ───
    root  /app/retailer/public;
    index index.php;

    # Lua variable that will hold the resolved tenant ID
    set $tenant_id "";

    # ── OpenResty: Redis domain → tenant_id lookup ────────────────────────────
    access_by_lua_block {
        local redis = require "resty.redis"
        local cache = ngx.shared.tenant_cache
        local host  = ngx.var.host

        -- 1. Fast path: in-process cache (avoids Redis round-trip every request)
        local tenant_id = cache:get(host)

        if not tenant_id then
            -- 2. Slow path: look up in Redis
            local red = redis:new()
            red:set_timeouts(500, 500, 500)  -- connect / send / read (ms)

            local ok, err = red:connect("redis", 6379)
            if not ok then
                ngx.log(ngx.ERR, "[storefront] Redis connect error: ", err)
                ngx.status = 503
                ngx.header["Content-Type"] = "text/plain"
                ngx.say("Gateway temporarily unavailable")
                return ngx.exit(503)
            end

            -- Authenticate if Redis is password-protected
            local pass = os.getenv("REDIS_PASSWORD")
            if pass and pass ~= "" then
                local res, auth_err = red:auth(pass)
                if not res then
                    ngx.log(ngx.ERR, "[storefront] Redis auth error: ", auth_err)
                    return ngx.exit(503)
                end
            end

            -- Key pattern: "domain:{hostname}" → "{tenant_id}"
            local val, get_err = red:get("domain:" .. host)

            -- Return connection to the keepalive pool (10 s TTL, 100 slots)
            red:set_keepalive(10000, 100)

            if get_err then
                ngx.log(ngx.ERR, "[storefront] Redis GET error: ", get_err)
                return ngx.exit(503)
            end

            if not val or val == ngx.null then
                ngx.log(ngx.WARN, "[storefront] No tenant registered for domain: ", host)
                ngx.status = 404
                ngx.header["Content-Type"] = "text/html; charset=utf-8"
                ngx.say("<h1>Storefront not found</h1><p>This domain is not registered.</p>")
                return ngx.exit(404)
            end

            tenant_id = val

            -- Cache for 60 seconds to absorb traffic spikes
            cache:set(host, tenant_id, 60)
        end

        ngx.var.tenant_id = tenant_id
    }

    # ── Static file serving & PHP routing ────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        set $upstream_retailer "retailer:9000";
        fastcgi_pass  $upstream_retailer;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param HTTPS           on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;

        # Tenant context — consumed by stancl/tenancy InitializeTenancyByRequestData
        fastcgi_param HTTP_X_TENANT_ID $tenant_id;

        # Pass the original custom domain so the Retailer service can use it
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
    }

    location ~ /\.(?!well-known).* { deny all; }
}
